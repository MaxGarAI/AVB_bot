<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer — getbiz.me</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 680px; width: 100%; padding: 20px; display: flex; flex-direction: column; }
        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { font-size: 24px; color: #0f0f23; }
        .header .subtitle { font-size: 14px; color: #666; margin-top: 4px; }
        .chat-box { flex: 1; background: white; border-radius: 16px; padding: 24px; overflow-y: auto; max-height: 60vh; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .msg { margin-bottom: 16px; max-width: 85%; clear: both; }
        .msg.assistant { float: left; }
        .msg.assistant .bubble { background: #eef2ff; border-radius: 4px 18px 18px 18px; padding: 12px 16px; font-size: 15px; line-height: 1.5; }
        .msg.user { float: right; }
        .msg.user .bubble { background: #0f0f23; color: white; border-radius: 18px 4px 18px 18px; padding: 12px 16px; font-size: 15px; line-height: 1.5; }
        .msg .label { font-size: 11px; color: #888; margin-bottom: 4px; padding: 0 4px; }
        .progress { background: #e0e7ff; border-radius: 8px; padding: 10px 14px; margin: 12px 0; font-size: 13px; color: #333; }
        .input-area { margin-top: 16px; display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; outline: none; transition: border .2s; }
        .input-area input:focus { border-color: #4f46e5; }
        .input-area button { padding: 14px 24px; background: #4f46e5; color: white; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; transition: background .2s; }
        .input-area button:hover { background: #4338ca; }
        .input-area button:disabled { background: #a5b4fc; cursor: not-allowed; }
        .completed-badge { background: #dcfce7; color: #166534; padding: 10px 16px; border-radius: 10px; text-align: center; font-weight: 600; margin-top: 12px; }
        .stage-badge { display: inline-block; background: #fef3c7; color: #92400e; font-size: 12px; padding: 4px 10px; border-radius: 20px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🤝 Dealer AI</h1>
        <div class="subtitle">Помогу найти дополнительные источники дохода для вашего бизнеса. Разговор займет 5–10 минут.</div>
        <div class="stage-badge" id="stageBadge">Ожидание</div>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="msg assistant">
            <div class="label">Dealer</div>
            <div class="bubble">Привет! Я Dealer — AI-консультант платформы getbiz.me. Расскажите о вашем бизнесе: чем занимаетесь, где находитесь?</div>
        </div>
    </div>
    <div id="progressArea"></div>
    <div class="input-area" id="inputArea">
        <input type="text" id="userInput" placeholder="Введите ответ..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">▶</button>
    </div>
</div>

<script>
    const token = window.location.pathname.split('/').pop();
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const stageBadge = document.getElementById('stageBadge');
    const progressArea = document.getElementById('progressArea');
    const inputArea = document.getElementById('inputArea');

    userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;
        userInput.disabled = true;

        try {
            const res = await fetch(`/api/chat/${token}/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });
            const data = await res.json();
            if (!res.ok) { addMessage('assistant', 'Ошибка: ' + (data.detail || 'неизвестная')); return; }
            addMessage('assistant', data.assistant_message);
            stageBadge.textContent = 'Стадия: ' + data.current_stage + ' | Заполнено: ' + data.completion_score + '%';

            if (data.status === 'completed') {
                progressArea.innerHTML = '<div class="completed-badge">✅ Интервью завершено! Профиль сохранен. Менеджер свяжется с вами.</div>';
                inputArea.style.display = 'none';
            }
        } catch (e) {
            addMessage('assistant', 'Ошибка соединения. Попробуйте еще раз.');
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.innerHTML = '<div class="label">' + (role === 'assistant' ? 'Dealer' : 'Вы') + '</div><div class="bubble">' + text + '</div>';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
